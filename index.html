<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XSO TERMINAL v2.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0c;
            color: #d1d5db;
            font-family: 'Courier New', monospace;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #1f2937; padding-bottom: 10px; margin-bottom: 10px;
        }
        .header h1 { color: #f97316; font-size: 18px; letter-spacing: 1px; }
        .status { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #22c55e; }
        .status-dot { width: 7px; height: 7px; background: #22c55e; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        .section-title {
            color: #f97316; font-size: 11px; letter-spacing: 1px;
            margin: 14px 0 6px; border-left: 3px solid #f97316; padding-left: 8px;
        }
        .signal-card {
            background: #111827; border: 1px solid #1f2937; border-radius: 8px;
            padding: 12px; margin-bottom: 10px; position: relative;
        }
        .signal-card.long { border-left: 3px solid #22c55e; }
        .signal-card.short { border-left: 3px solid #ef4444; }
        .signal-header { display: flex; justify-content: space-between; align-items: center; }
        .signal-type { font-weight: bold; font-size: 13px; }
        .long .signal-type { color: #22c55e; }
        .short .signal-type { color: #ef4444; }
        .accuracy { background: #1f2937; padding: 3px 8px; border-radius: 10px; font-size: 11px; color: #fbbf24; }
        .signal-details { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; font-size: 11px; }
        .detail-item { display: flex; justify-content: space-between; }
        .detail-label { color: #6b7280; }
        .detail-value { color: #e5e7eb; }
        .confluence { margin-top: 8px; font-size: 10px; color: #6b7280; border-top: 1px solid #1f2937; padding-top: 6px; }
        .confluence span { color: #22c55e; margin-right: 6px; }
        .watchlist { display: flex; flex-wrap: wrap; gap: 6px; }
        .watch-item {
            background: #111827; border: 1px solid #1f2937; border-radius: 6px;
            padding: 6px 10px; font-size: 11px; display: flex; align-items: center;
            gap: 6px; flex: 1; min-width: 45%;
        }
        .watch-symbol { font-weight: bold; color: #e5e7eb; }
        .watch-change.up { color: #22c55e; }
        .watch-change.down { color: #ef4444; }
        .log-area {
            background: #0a0a0c; border: 1px solid #1f2937; border-radius: 6px;
            padding: 8px; margin-top: 10px; height: 100px; overflow-y: auto;
            font-size: 10px; color: #6b7280; flex-grow: 1;
        }
        .log-entry { margin-bottom: 3px; }
        .log-entry .time { color: #f97316; margin-right: 6px; }
        .loading { text-align: center; color: #6b7280; padding: 20px; font-style: italic; }
        .footer {
            margin-top: 10px; text-align: center; font-size: 9px;
            color: #374151; border-top: 1px solid #1f2937; padding-top: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ XSO v2.0</h1>
        <div class="status"><div class="status-dot"></div>LIVE</div>
    </div>

    <div id="signals-container"><div class="loading">🔍 Scanning 150 coins...</div></div>

    <div class="section-title">🔥 WATCHLIST</div>
    <div class="watchlist" id="watchlist"><div class="loading">Loading...</div></div>

    <div class="section-title">📋 SIGNAL LOG</div>
    <div class="log-area" id="log">
        <div class="log-entry"><span class="time">[--:--]</span> Initializing v2.0...</div>
    </div>

    <div class="footer">XSO TERMINAL v2.0 | Data: Binance Futures | Filter: Institutional Grade</div>

    <script>
        // ============ 150 LOW-MID CAP ALTCOINS ============
        const SYMBOLS = [
            'COTIUSDT','HIGHUSDT','JOEUSDT','ACHUSDT','DUSKUSDT','IDUSDT','CTSIUSDT',
            'BONKUSDT','FLOKIUSDT','PEPEUSDT','WIFUSDT','ENAUSDT','REIUSDT','FRONTUSDT',
            'BICOUSDT','LITUSDT','RLCUSDT','TRBUSDT','SUPERUSDT','TLMUSDT','AGLDUSDT',
            'AIUSDT','ALICEUSDT','ALPHAUSDT','AMBUSDT','ANKRUSDT','API3USDT','ARPAUSDT',
            'ASTRUSDT','ATAUSDT','AUCTIONUSDT','AUDIOUSDT','AVAUSDT','AXSUSDT','BAKEUSDT',
            'BALUSDT','BANDUSDT','BATUSDT','BELUSDT','BLURUSDT','BNXUSDT','BSWUSDT',
            'C98USDT','CELOUSDT','CELRUSDT','CHZUSDT','CKBUSDT','COMBOUSDT','COMPUSDT',
            'CRVUSDT','CVXUSDT','CYBERUSDT','DARUSDT','DASHUSDT','DENTUSDT','DGBUSDT',
            'DODOUSDT','DOGEUSDT','DOTUSDT','DYDXUSDT','EGLDUSDT','ENJUSDT','ENSUSDT',
            'EOSUSDT','ETCUSDT','FETUSDT','FILUSDT','FIOUSDT','FLMUSDT','FLOWUSDT',
            'FORTHUSDT','FTMUSDT','FXSUSDT','GALAUSDT','GLMRUSDT','GLMUSDT','GMTUSDT',
            'GMXUSDT','GRTUSDT','GTCUSDT','HBARUSDT','HFTUSDT','HNTUSDT','HOOKUSDT',
            'HOTUSDT','ICPUSDT','ICXUSDT','ILVUSDT','IMXUSDT','INJUSDT','IOSTUSDT',
            'IOTAUSDT','IOTXUSDT','JASMYUSDT','JTOUSDT','KAVAUSDT','KDAUSDT','KEYUSDT',
            'KLAYUSDT','KNCUSDT','KSMUSDT','LDOUSDT','LEVERUSDT','LINAUSDT','LINKUSDT',
            'LOOMUSDT','LPTUSDT','LQTYUSDT','LRCUSDT','LSKUSDT','LTCUSDT','LUNAUSDT',
            'MAGICUSDT','MANAUSDT','MASKUSDT','MINAUSDT','MKRUSDT','MTLUSDT','NEARUSDT',
            'NEOUSDT','NKNUSDT','NMRUSDT','OCEANUSDT','OGNUSDT','OMGUSDT','ONEUSDT',
            'ONTUSDT','OPUSDT','OXTUSDT','PENDLEUSDT','PEOPLEUSDT','PERPUSDT','PHBUSDT',
            'POLYXUSDT','POWRUSDT','QNTUSDT','QTUMUSDT','RADUSDT','RDNTUSDT','REEFUSDT',
            'RENUSDT','RIFUSDT','RNDRUSDT','ROSEUSDT','RSRUSDT','RUNEUSDT','RVNUSDT',
            'SANDUSDT','SEIUSDT','SFPUSDT','SHIBUSDT','SKLUSDT','SLPUSDT','SNXUSDT',
            'SOLUSDT','SPELLUSDT','SSVUSDT','STGUSDT','STMXUSDT','STORJUSDT','STXUSDT',
            'SUNUSDT','SUSHIUSDT','TUSDT','TFUELUSDT','THETAUSDT','TIAUSDT','TOKENUSDT',
            'TRUUSDT','TRXUSDT','TWTUSDT','UMAUSDT','UNFIUSDT','UNIUSDT','VETUSDT',
            'VGXUSDT','WAVESUSDT','WAXPUSDT','WLDUSDT','WOOUSDT','XECUSDT','XEMUSDT',
            'XLMUSDT','XMRUSDT','XNOUSDT','XRPUSDT','XTZUSDT','YFIUSDT','YGGUSDT',
            'ZECUSDT','ZENUSDT','ZILUSDT','ZRXUSDT'
        ];

        const watchCoins = ['COTIUSDT', 'HIGHUSDT', 'JOEUSDT', 'IDUSDT', 'PEPEUSDT', 'WIFUSDT'];

        // ============ STATE ============
        const tickerData = {};
        const signalHistory = {};
        let lastSignalTime = 0;
        const SIGNAL_COOLDOWN = 120000;
        let connected = false;

        function addLog(msg) {
            const logDiv = document.getElementById('log');
            const now = new Date();
            const time = now.toTimeString().slice(0, 8);
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="time">[${time}]</span> ${msg}`;
            logDiv.prepend(entry);
            if (logDiv.children.length > 40) logDiv.removeChild(logDiv.lastChild);
        }

        // ============ WEBSOCKET: 24HR TICKER + ORDER BOOK ============
        function connectWebSocket() {
            const tickerStreams = SYMBOLS.map(s => `${s.toLowerCase()}@ticker`).join('/');
            const ws = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${tickerStreams}`);

            ws.onopen = () => {
                connected = true;
                addLog('✅ Connected. Scanning 150 coins...');
                document.querySelector('.loading')?.remove();
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.data && msg.data.s) {
                    const t = msg.data;
                    const symbol = t.s;
                    const price = parseFloat(t.c);
                    const change = parseFloat(t.P);
                    const volume = parseFloat(t.q);
                    const high = parseFloat(t.h);
                    const low = parseFloat(t.l);
                    const bidQty = parseFloat(t.B);
                    const askQty = parseFloat(t.A);
                    const count = parseInt(t.n);

                    tickerData[symbol] = {
                        price, change, volume, high, low,
                        bidQty, askQty, count,
                        prevPrice: tickerData[symbol]?.price || price
                    };

                    if (watchCoins.includes(symbol)) updateWatchlist();
                    analyzeSignal(symbol);
                }
            };

            ws.onerror = () => { addLog('❌ WS Error. Reconnecting...'); connected = false; };
            ws.onclose = () => { addLog('⚠️ Disconnected. Reconnecting...'); connected = false; setTimeout(connectWebSocket, 3000); };
        }

        // ============ WATCHLIST ============
        function updateWatchlist() {
            const container = document.getElementById('watchlist');
            container.innerHTML = '';
            for (const symbol of watchCoins) {
                const d = tickerData[symbol];
                if (!d) continue;
                const name = symbol.replace('USDT', '');
                const changeClass = d.change >= 0 ? 'up' : 'down';
                const sign = d.change >= 0 ? '+' : '';
                container.innerHTML += `
                    <div class="watch-item">
                        <span class="watch-symbol">${name}</span>
                        <span>$${d.price < 1 ? d.price.toFixed(6) : d.price.toFixed(4)}</span>
                        <span class="watch-change ${changeClass}">${sign}${d.change.toFixed(1)}%</span>
                    </div>`;
            }
        }

        // ============ SIGNAL ENGINE v2.0 ============
        function analyzeSignal(symbol) {
            const now = Date.now();
            if (now - lastSignalTime < SIGNAL_COOLDOWN) return;
            if (signalHistory[symbol]) return;

            const d = tickerData[symbol];
            if (!d) return;

            const price = d.price;
            const change = d.change;
            const volume = d.volume;
            const bidQty = d.bidQty;
            const askQty = d.askQty;
            const count = d.count;
            const high = d.high;
            const low = d.low;
            const range = high - low;

            // ============ FILTER 1: Minimal potensi 5% ============
            const volatility = range > 0 ? (range / price) * 100 : 0;
            const potentialMove = Math.abs(change) + volatility;
            if (potentialMove < 5) return;

            // ============ FILTER 2: Volume spike (min 2x rata-rata) ============
            const avgVolumePerTrade = count > 0 ? volume / count : 0;
            if (avgVolumePerTrade < 500) return;

            // ============ FILTER 3: Bid/Ask ratio ============
            const bidAskRatio = askQty > 0 ? bidQty / askQty : 1;
            const isLongBias = bidAskRatio > 1.3;
            const isShortBias = bidAskRatio < 0.7;
            const isNeutral = !isLongBias && !isShortBias;
            if (isNeutral) return;

            // ============ FILTER 4: CVD proxy (price vs bid/ask imbalance) ============
            const prevPrice = d.prevPrice;
            const priceDelta = price - prevPrice;
            const orderFlowBullish = priceDelta > 0 && bidAskRatio > 1.2;
            const orderFlowBearish = priceDelta < 0 && bidAskRatio < 0.8;
            const orderFlowConfirm = orderFlowBullish || orderFlowBearish;
            if (!orderFlowConfirm) return;

            // ============ FILTER 5: Momentum aligned ============
            const direction = change > 0 ? 'long' : 'short';
            if (direction === 'long' && !isLongBias) return;
            if (direction === 'short' && !isShortBias) return;

            // ============ FILTER 6: Volume threshold ============
            if (volume < 500000) return;

            // ============ SCORING ============
            let score = 0;
            score += Math.min(25, potentialMove * 4);
            score += Math.min(20, (Math.abs(bidAskRatio - 1) * 30));
            score += Math.min(20, Math.abs(change) * 3);
            score += volume > 2000000 ? 15 : volume > 1000000 ? 10 : 5;
            score += orderFlowConfirm ? 20 : 0;
            score = Math.min(100, score);

            if (score < 85) return;

            // ============ SIGNAL GENERATED ============
            signalHistory[symbol] = true;
            lastSignalTime = now;
            const name = symbol.replace('USDT', '');
            const type = direction;
            const sl = type === 'long' ? price * 0.965 : price * 1.035;
            const tp1 = type === 'long' ? price * 1.05 : price * 0.95;
            const tp2 = type === 'long' ? price * 1.08 : price * 0.92;
            const risk = ((Math.abs(price - sl) / price) * 100).toFixed(1);
            const reward = ((Math.abs(tp1 - price) / price) * 100).toFixed(1);

            const confluence = [];
            if (bidAskRatio > 1.5) confluence.push('Bid dominance strong');
            if (bidAskRatio < 0.5) confluence.push('Ask dominance strong');
            if (volatility > 3) confluence.push('High volatility');
            if (volume > 2000000) confluence.push('Volume spike 2x+');
            if (orderFlowBullish) confluence.push('CVD bullish divergence');
            if (orderFlowBearish) confluence.push('CVD bearish divergence');

            const signalsContainer = document.getElementById('signals-container');
            signalsContainer.innerHTML = `
                <div class="signal-card ${type}">
                    <div class="signal-header">
                        <span class="signal-type">${type === 'long' ? '🟢 LONG' : '🔴 SHORT'} — ${name}</span>
                        <span class="accuracy">🎯 ${score.toFixed(0)}%</span>
                    </div>
                    <div class="signal-details">
                        <div class="detail-item"><span class="detail-label">Entry:</span><span class="detail-value">$${price.toFixed(6)}</span></div>
                        <div class="detail-item"><span class="detail-label">SL:</span><span class="detail-value">$${sl.toFixed(6)} (-${risk}%)</span></div>
                        <div class="detail-item"><span class="detail-label">TP1 (+5%):</span><span class="detail-value">$${tp1.toFixed(6)} (+${reward}%)</span></div>
                        <div class="detail-item"><span class="detail-label">TP2 (+8%):</span><span class="detail-value">$${tp2.toFixed(6)}</span></div>
                    </div>
                    <div class="confluence">${confluence.map(c => '<span>✔</span>' + c).join(' ')}</div>
                </div>
            ` + signalsContainer.innerHTML;

            addLog(`🚨 ${type.toUpperCase()} ${name} | Score: ${score.toFixed(0)}% | $${price.toFixed(6)} | Vol: $${(volume/1000000).toFixed(1)}M`);
            setTimeout(() => { signalHistory[symbol] = false; }, 600000);
        }

        // ============ INIT ============
        connectWebSocket();
        addLog('🟢 XSO Terminal v2.0 active | 150 coins | Institutional filters ON');
    </script>
<script src="apikey.js"></script>
</body>
</html>
