<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XSO TERMINAL v5.1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0c; color: #d1d5db; font-family: 'Courier New', monospace; padding: 10px; font-size: 11px; }
        .header { color: #f97316; font-size: 16px; font-weight: bold; border-bottom: 1px solid #1f2937; padding-bottom: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .live { color: #22c55e; font-size: 10px; }
        .mode-selector { display: flex; gap: 6px; margin: 8px 0; }
        .mode-btn { flex: 1; padding: 8px; border: 1px solid #1f2937; border-radius: 6px; background: #111827; color: #6b7280; text-align: center; font-size: 10px; font-weight: bold; cursor: pointer; }
        .mode-btn.active { border-color: #f97316; color: #f97316; background: #1a1208; }
        .mode-btn.elite.active { border-color: #ef4444; color: #ef4444; background: #1a0808; }
        .signal { background: #111827; border-left: 4px solid #22c55e; padding: 10px; margin: 8px 0; border-radius: 6px; }
        .signal.short { border-left-color: #ef4444; }
        .signal-title { font-weight: bold; font-size: 13px; }
        .signal.long .signal-title { color: #22c55e; }
        .signal.short .signal-title { color: #ef4444; }
        .score { background: #1f2937; color: #fbbf24; padding: 2px 8px; border-radius: 8px; font-size: 10px; }
        .row { display: flex; justify-content: space-between; margin: 3px 0; }
        .label { color: #6b7280; }
        .val { color: #e5e7eb; }
        .tags { margin-top: 6px; font-size: 9px; color: #22c55e; }
        .watch { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0; }
        .watch-item { background: #111827; padding: 5px 8px; border-radius: 5px; font-size: 10px; display: flex; gap: 6px; }
        .green { color: #22c55e; } .red { color: #ef4444; }
        #log { background: #050608; padding: 8px; margin-top: 8px; height: 100px; overflow-y: auto; font-size: 9px; color: #6b7280; border-radius: 5px; }
        .footer { text-align: center; color: #374151; font-size: 8px; margin-top: 8px; }
        .mode-badge { font-size: 8px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
        .mode-badge.elite { background: #4c0519; color: #ef4444; }
        .mode-badge.active { background: #1a1208; color: #f97316; }
    </style>
</head>
<body>
    <div class="header">
        ⚡ XSO v5.1 <span class="live">● LIVE</span>
    </div>

    <div class="mode-selector">
        <div class="mode-btn elite active" id="mode-elite" onclick="setMode('elite')">🔴 ELITE<br><small>85% · 1:3 RRR</small></div>
        <div class="mode-btn" id="mode-active" onclick="setMode('active')">🟡 ACTIVE<br><small>78% · 1:2.5 RRR</small></div>
    </div>

    <div id="signals"><div style="color:#6b7280;text-align:center;padding:20px;">🔍 Scanning 150 coins...<br><small id="mode-display">Mode: ELITE (Score ≥ 85%)</small></div></div>

    <div style="color:#f97316;font-weight:bold;margin-top:10px;">🔥 WATCHLIST</div>
    <div class="watch" id="watchlist"></div>
    <div id="log"></div>
    <div class="footer">XSO TERMINAL v5.1 | Dual Mode | Binance Futures</div>

    <script>
        // ========== API KEY ==========
        const BINANCE_API_KEY = "gTLiNp5jUx2EjVbK20unQd7EM9GimHwdkzF83SLw8zxNpp21gsOZWm38SdtZSemd";
        const BINANCE_SECRET = "fptEkB5qCzYX1D97Wlvl459vEqx29HgJawI3sfMLKl97zNqk5DdmYAY2Jo9URXjP";
        const TELEGRAM_TOKEN = "8626803193:AAEjn2EWI4IPBWJ3NdT_AWL3VGPYgnIH_mU";
        const TELEGRAM_CHAT_ID = "8447813471";

        // ========== 150 COINS ==========
        const SYMBOLS = ['COTIUSDT','HIGHUSDT','JOEUSDT','ACHUSDT','DUSKUSDT','IDUSDT','CTSIUSDT','BONKUSDT','FLOKIUSDT','PEPEUSDT','WIFUSDT','ENAUSDT','REIUSDT','FRONTUSDT','BICOUSDT','LITUSDT','RLCUSDT','TRBUSDT','SUPERUSDT','TLMUSDT','AGLDUSDT','AIUSDT','ALICEUSDT','ALPHAUSDT','AMBUSDT','ANKRUSDT','API3USDT','ARPAUSDT','ASTRUSDT','ATAUSDT','AUCTIONUSDT','AUDIOUSDT','AVAUSDT','AXSUSDT','BAKEUSDT','BALUSDT','BANDUSDT','BATUSDT','BELUSDT','BLURUSDT','BNXUSDT','BSWUSDT','C98USDT','CELOUSDT','CELRUSDT','CHZUSDT','CKBUSDT','COMBOUSDT','COMPUSDT','CRVUSDT','CVXUSDT','CYBERUSDT','DARUSDT','DASHUSDT','DENTUSDT','DGBUSDT','DODOUSDT','DOGEUSDT','DOTUSDT','DYDXUSDT','EGLDUSDT','ENJUSDT','ENSUSDT','EOSUSDT','ETCUSDT','FETUSDT','FILUSDT','FIOUSDT','FLMUSDT','FLOWUSDT','FORTHUSDT','FTMUSDT','FXSUSDT','GALAUSDT','GLMRUSDT','GLMUSDT','GMTUSDT','GMXUSDT','GRTUSDT','GTCUSDT','HBARUSDT','HFTUSDT','HNTUSDT','HOOKUSDT','HOTUSDT','ICPUSDT','ICXUSDT','ILVUSDT','IMXUSDT','INJUSDT','IOSTUSDT','IOTAUSDT','IOTXUSDT','JASMYUSDT','JTOUSDT','KAVAUSDT','KDAUSDT','KEYUSDT','KLAYUSDT','KNCUSDT','KSMUSDT','LDOUSDT','LEVERUSDT','LINAUSDT','LINKUSDT','LOOMUSDT','LPTUSDT','LQTYUSDT','LRCUSDT','LSKUSDT','LTCUSDT','LUNAUSDT','MAGICUSDT','MANAUSDT','MASKUSDT','MINAUSDT','MKRUSDT','MTLUSDT','NEARUSDT','NEOUSDT','NKNUSDT','NMRUSDT','OCEANUSDT','OGNUSDT','OMGUSDT','ONEUSDT','ONTUSDT','OPUSDT','OXTUSDT','PENDLEUSDT','PEOPLEUSDT','PERPUSDT','PHBUSDT','POLYXUSDT','POWRUSDT','QNTUSDT','QTUMUSDT','RADUSDT','RDNTUSDT','REEFUSDT','RENUSDT','RIFUSDT','RNDRUSDT','ROSEUSDT','RSRUSDT','RUNEUSDT','RVNUSDT','SANDUSDT','SEIUSDT','SFPUSDT','SHIBUSDT','SKLUSDT','SLPUSDT','SNXUSDT','SOLUSDT','SPELLUSDT','SSVUSDT','STGUSDT','STMXUSDT','STORJUSDT','STXUSDT','SUNUSDT','SUSHIUSDT','TUSDT','TFUELUSDT','THETAUSDT','TIAUSDT','TOKENUSDT','TRUUSDT','TRXUSDT','TWTUSDT','UMAUSDT','UNFIUSDT','UNIUSDT','VETUSDT','VGXUSDT','WAVESUSDT','WAXPUSDT','WLDUSDT','WOOUSDT','XECUSDT','XEMUSDT','XLMUSDT','XMRUSDT','XNOUSDT','XRPUSDT','XTZUSDT','YFIUSDT','YGGUSDT','ZECUSDT','ZENUSDT','ZILUSDT','ZRXUSDT'];

        const watchCoins = ['COTIUSDT','HIGHUSDT','JOEUSDT','IDUSDT','PEPEUSDT','WIFUSDT'];
        const tickerData = {}, oiData = {}, fundingData = {}, signalHistory = {}, priceHistory = {};
        let lastSignalTime = 0;
        let currentMode = 'elite';

        function log(msg) {
            const l = document.getElementById('log');
            const t = new Date().toTimeString().slice(0,8);
            l.innerHTML = `<div>[${t}] ${msg}</div>` + l.innerHTML;
            if (l.children.length > 30) l.removeChild(l.lastChild);
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-elite').classList.toggle('active', mode === 'elite');
            document.getElementById('mode-active').classList.toggle('active', mode === 'active');
            const display = document.getElementById('mode-display');
            if (mode === 'elite') {
                display.innerHTML = 'Mode: ELITE (Score ≥ 85% · RRR ≥ 1:3 · Vol ≥ $800K)';
            } else {
                display.innerHTML = 'Mode: ACTIVE (Score ≥ 78% · RRR ≥ 1:2.5 · Vol ≥ $500K)';
            }
            log('🔄 Mode: ' + mode.toUpperCase());
        }

        async function fetchOI() {
            try {
                const r = await fetch('https://fapi.binance.com/fapi/v1/openInterest', { headers: { 'X-MBX-APIKEY': BINANCE_API_KEY } });
                const d = await r.json();
                if (Array.isArray(d)) { d.forEach(x => oiData[x.symbol] = parseFloat(x.openInterest)); log('✅ OI loaded'); }
            } catch(e) {}
        }

        async function fetchFunding() {
            try {
                const r = await fetch('https://fapi.binance.com/fapi/v1/premiumIndex', { headers: { 'X-MBX-APIKEY': BINANCE_API_KEY } });
                const d = await r.json();
                if (Array.isArray(d)) { d.forEach(x => fundingData[x.symbol] = parseFloat(x.lastFundingRate)); log('✅ Funding loaded'); }
            } catch(e) {}
        }

        function connectWS() {
            const streams = SYMBOLS.map(s => s.toLowerCase() + '@ticker').join('/');
            const ws = new WebSocket('wss://stream.binance.com:9443/stream?streams=' + streams);
            ws.onopen = () => { log('✅ WebSocket LIVE'); document.querySelector('#signals div')?.remove(); };
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (!msg.data) return;
                const t = msg.data;
                const s = t.s;
                const price = parseFloat(t.c);
                const change = parseFloat(t.P);
                const vol = parseFloat(t.q);
                const bid = parseFloat(t.B);
                const ask = parseFloat(t.A);
                const cnt = parseInt(t.n);

                if (!priceHistory[s]) priceHistory[s] = [];
                priceHistory[s].push({ price, volume: parseFloat(t.v), time: Date.now() });
                if (priceHistory[s].length > 200) priceHistory[s].shift();

                tickerData[s] = { price, change, volume: vol, bidQty: bid, askQty: ask, count: cnt, prevPrice: tickerData[s]?.price || price };
                if (watchCoins.includes(s)) updateWatch();
                analyzeSignal(s);
            };
            ws.onclose = () => { log('⚠️ Reconnecting...'); setTimeout(connectWS, 3000); };
        }

        function updateWatch() {
            const c = document.getElementById('watchlist');
            c.innerHTML = '';
            for (const s of watchCoins) {
                const d = tickerData[s];
                if (!d) continue;
                const n = s.replace('USDT','');
                const cls = d.change >= 0 ? 'green' : 'red';
                const sign = d.change >= 0 ? '+' : '';
                c.innerHTML += `<div class="watch-item"><b>${n}</b> $${d.price<1?d.price.toFixed(6):d.price.toFixed(4)} <span class="${cls}">${sign}${d.change.toFixed(1)}%</span></div>`;
            }
        }

        function analyzeSignal(symbol) {
            const now = Date.now();
            const cooldown = currentMode === 'elite' ? 90000 : 45000;
            if (now - lastSignalTime < cooldown) return;
            if (signalHistory[symbol]) return;
            const d = tickerData[symbol];
            if (!d) return;
            const hist = priceHistory[symbol];
            if (!hist || hist.length < 50) return;

            const price = d.price, change = d.change, vol = d.volume;
            const bid = d.bidQty, ask = d.askQty, cnt = d.count;

            // Mode-based thresholds
            const minVol = currentMode === 'elite' ? 800000 : 500000;
            const minBaLong = currentMode === 'elite' ? 1.4 : 1.2;
            const maxBaShort = currentMode === 'elite' ? 0.6 : 0.8;
            const minRRR = currentMode === 'elite' ? 3.0 : 2.5;
            const minScore = currentMode === 'elite' ? 85 : 78;
            const minAvgTrade = currentMode === 'elite' ? 600 : 400;

            if (vol < minVol) return;

            const baRatio = ask > 0 ? bid / ask : 1;
            const direction = change > 0 ? 'long' : 'short';

            if (direction === 'long' && baRatio < minBaLong) return;
            if (direction === 'short' && baRatio > maxBaShort) return;

            const cvdOk = (direction === 'long' && price > d.prevPrice && baRatio > (currentMode==='elite'?1.3:1.15)) || (direction === 'short' && price < d.prevPrice && baRatio < (currentMode==='elite'?0.7:0.85));
            if (!cvdOk) return;

            const avgTrade = cnt > 0 ? vol / cnt : 0;
            if (avgTrade < minAvgTrade) return;

            // Session filter (longgarin di active)
            const hour = new Date().getUTCHours();
            const isHighVol = currentMode === 'elite' ? ((hour >= 7 && hour <= 10) || (hour >= 12 && hour <= 16) || (hour >= 19 && hour <= 22)) : ((hour >= 6 && hour <= 11) || (hour >= 12 && hour <= 17) || (hour >= 18 && hour <= 23) || (hour >= 0 && hour <= 2));
            if (!isHighVol) return;

            const sl = direction === 'long' ? price * 0.965 : price * 1.035;
            const tp1 = direction === 'long' ? price * 1.05 : price * 0.95;
            const rrr = Math.abs(price - sl) > 0 ? Math.abs(tp1 - price) / Math.abs(price - sl) : 0;
            if (rrr < minRRR) return;

            const oi = oiData[symbol] || 0;
            const funding = fundingData[symbol] || 0;

            let score = 50;
            score += Math.min(15, Math.abs(change) * 3);
            score += Math.min(12, Math.abs(baRatio - 1) * 25);
            score += vol > 3000000 ? 12 : vol > 1500000 ? 8 : vol > 800000 ? 5 : 3;
            score += rrr >= 4 ? 5 : rrr >= 3 ? 3 : 2;
            score += cvdOk ? 15 : 0;
            if (oi > 0) score += 5;
            if ((direction === 'long' && funding < 0.005) || (direction === 'short' && funding > 0.005)) score += 5;
            if (currentMode === 'active') score += 5;
            if (score < minScore) return;

            signalHistory[symbol] = true;
            lastSignalTime = now;
            const name = symbol.replace('USDT','');
            const type = direction;
            const tp2 = type === 'long' ? price * 1.08 : price * 0.92;
            const modeLabel = currentMode === 'elite' ? 'ELITE' : 'ACTIVE';
            const modeClass = currentMode === 'elite' ? 'elite' : 'active';

            let tags = '';
            if (baRatio > 1.6) tags += '✔Bid dominance ';
            if (baRatio < 0.4) tags += '✔Ask dominance ';
            if (rrr >= 4) tags += '✔RRR excellent ';
            if (oi > 0) tags += '✔OI:$' + (oi/1000000).toFixed(1) + 'M ';
            if (funding !== 0) tags += '✔F:' + (funding*100).toFixed(3) + '% ';

            const sigDiv = document.getElementById('signals');
            sigDiv.innerHTML = `
                <div class="signal ${type}">
                    <div style="display:flex;justify-content:space-between;">
                        <span class="signal-title">${type==='long'?'🟢 LONG':'🔴 SHORT'} — ${name} <span class="mode-badge ${modeClass}">${modeLabel}</span></span>
                        <span class="score">🎯 ${score.toFixed(0)}%</span>
                    </div>
                    <div style="color:#a78bfa;font-size:10px;">📐 RRR: 1:${rrr.toFixed(1)}</div>
                    <div class="row"><span class="label">Entry:</span><span class="val">$${price<1?price.toFixed(6):price.toFixed(4)}</span></div>
                    <div class="row"><span class="label">SL:</span><span class="val">$${sl<1?sl.toFixed(6):sl.toFixed(4)} (-${((Math.abs(price-sl)/price)*100).toFixed(1)}%)</span></div>
                    <div class="row"><span class="label">TP1 (+5%):</span><span class="val">$${tp1<1?tp1.toFixed(6):tp1.toFixed(4)}</span></div>
                    <div class="row"><span class="label">TP2 (+8%):</span><span class="val">$${tp2<1?tp2.toFixed(6):tp2.toFixed(4)}</span></div>
                    <div class="tags">${tags}</div>
                </div>
            ` + sigDiv.innerHTML;

            log(`🚨 [${modeLabel}] ${type.toUpperCase()} ${name} | ${score.toFixed(0)}% | $${price.toFixed(6)}`);
            setTimeout(() => { signalHistory[symbol] = false; }, currentMode === 'elite' ? 600000 : 300000);
        }

        // ========== INIT ==========
        fetchOI();
        fetchFunding();
        setInterval(fetchOI, 120000);
        setInterval(fetchFunding, 120000);
        connectWS();
        log('🟢 v5.1 Dual Mode Ready');
    </script>
</body>
</html>
