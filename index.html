<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XSO TERMINAL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0c;
            color: #d1d5db;
            font-family: 'Courier New', monospace;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f2937;
            padding-bottom: 12px;
            margin-bottom: 12px;
        }
        .header h1 {
            color: #f97316;
            font-size: 20px;
            letter-spacing: 2px;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #22c55e;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        .section-title {
            color: #f97316;
            font-size: 12px;
            letter-spacing: 1px;
            margin: 16px 0 8px;
            border-left: 3px solid #f97316;
            padding-left: 10px;
        }
        .signal-card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }
        .signal-card.long {
            border-left: 3px solid #22c55e;
        }
        .signal-card.short {
            border-left: 3px solid #ef4444;
        }
        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .signal-type {
            font-weight: bold;
            font-size: 14px;
        }
        .long .signal-type {
            color: #22c55e;
        }
        .short .signal-type {
            color: #ef4444;
        }
        .accuracy {
            background: #1f2937;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #fbbf24;
        }
        .signal-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 8px;
            font-size: 12px;
        }
        .detail-item {
            display: flex;
            justify-content: space-between;
        }
        .detail-label {
            color: #6b7280;
        }
        .detail-value {
            color: #e5e7eb;
        }
        .watchlist {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .watch-item {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 45%;
        }
        .watch-symbol {
            font-weight: bold;
            color: #e5e7eb;
        }
        .watch-change.up {
            color: #22c55e;
        }
        .watch-change.down {
            color: #ef4444;
        }
        .log-area {
            background: #0a0a0c;
            border: 1px solid #1f2937;
            border-radius: 6px;
            padding: 10px;
            margin-top: 12px;
            height: 120px;
            overflow-y: auto;
            font-size: 11px;
            color: #6b7280;
            flex-grow: 1;
        }
        .log-entry {
            margin-bottom: 4px;
        }
        .log-entry .time {
            color: #f97316;
            margin-right: 8px;
        }
        .loading {
            text-align: center;
            color: #6b7280;
            padding: 20px;
            font-style: italic;
        }
        .footer {
            margin-top: 12px;
            text-align: center;
            font-size: 10px;
            color: #374151;
            border-top: 1px solid #1f2937;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ XSO TERMINAL</h1>
        <div class="status">
            <div class="status-dot"></div>LIVE
        </div>
    </div>

    <div id="signals-container">
        <div class="loading">🔍 Scanning market...</div>
    </div>

    <div class="section-title">🔥 WATCHLIST</div>
    <div class="watchlist" id="watchlist">
        <div class="loading">Loading...</div>
    </div>

    <div class="section-title">📋 LOG</div>
    <div class="log-area" id="log">
        <div class="log-entry"><span class="time">[--:--]</span> Initializing terminal...</div>
    </div>

    <div class="footer">XSO TERMINAL v1.0 | Data: Binance</div>

    <script>
        const SYMBOLS = [
            'COTIUSDT', 'HIGHUSDT', 'JOEUSDT', 'ACHUSDT', 'DUSKUSDT',
            'IDUSDT', 'CTSIUSDT', 'BONKUSDT', 'FLOKIUSDT', 'PEPEUSDT',
            'WIFUSDT', 'ENAUSDT', 'REIUSDT', 'FRONTUSDT', 'BICOUSDT',
            'LITUSDT', 'RLCUSDT', 'TRBUSDT', 'SUPERUSDT', 'TLMUSDT'
        ];

        const watchCoins = ['COTIUSDT', 'HIGHUSDT', 'JOEUSDT', 'IDUSDT'];

        function addLog(msg) {
            const logDiv = document.getElementById('log');
            const now = new Date();
            const time = now.toTimeString().slice(0, 8);
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="time">[${time}]</span> ${msg}`;
            logDiv.prepend(entry);
            if (logDiv.children.length > 30) logDiv.removeChild(logDiv.lastChild);
        }

        const watchlistData = {};
        const streams = {};

        function connectWebSocket() {
            const streamsStr = SYMBOLS.map(s => `${s.toLowerCase()}@ticker`).join('/');
            const ws = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streamsStr}`);

            ws.onopen = () => {
                addLog('✅ Connected to Binance WebSocket');
                document.querySelector('.loading')?.remove();
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.data && msg.data.s) {
                    const ticker = msg.data;
                    const symbol = ticker.s;
                    const price = parseFloat(ticker.c);
                    const change = parseFloat(ticker.P);
                    const volume = parseFloat(ticker.q);

                    if (watchCoins.includes(symbol)) {
                        watchlistData[symbol] = { price, change, volume };
                        updateWatchlist();
                    }

                    analyzeSignal(symbol, price, change, volume);
                }
            };

            ws.onerror = () => {
                addLog('❌ WebSocket error. Reconnecting...');
                setTimeout(connectWebSocket, 3000);
            };

            ws.onclose = () => {
                addLog('⚠️ Connection closed. Reconnecting...');
                setTimeout(connectWebSocket, 3000);
            };
        }

        function updateWatchlist() {
            const container = document.getElementById('watchlist');
            container.innerHTML = '';
            for (const [symbol, data] of Object.entries(watchlistData)) {
                const name = symbol.replace('USDT', '');
                const changeClass = data.change >= 0 ? 'up' : 'down';
                const sign = data.change >= 0 ? '+' : '';
                container.innerHTML += `
                    <div class="watch-item">
                        <span class="watch-symbol">${name}</span>
                        <span>$${data.price.toFixed(4)}</span>
                        <span class="watch-change ${changeClass}">${sign}${data.change.toFixed(1)}%</span>
                    </div>
                `;
            }
        }

        const signalHistory = {};
        let lastSignalTime = 0;
        const SIGNAL_COOLDOWN = 180000;

        function analyzeSignal(symbol, price, change, volume) {
            const now = Date.now();
            if (now - lastSignalTime < SIGNAL_COOLDOWN) return;

            const absChange = Math.abs(change);
            const score = Math.min(100, (absChange * 12) + (volume > 1000000 ? 15 : 5) + (absChange > 3 ? 20 : 0));

            if (score >= 85 && !signalHistory[symbol] && Math.random() < 0.15) {
                signalHistory[symbol] = true;
                lastSignalTime = now;
                const isLong = change > 0;
                const type = isLong ? 'long' : 'short';
                const name = symbol.replace('USDT', '');
                const entryLow = price * 0.998;
                const entryHigh = price * 1.002;
                const sl = isLong ? price * 0.97 : price * 1.03;
                const tp1 = isLong ? price * 1.03 : price * 0.97;
                const tp2 = isLong ? price * 1.05 : price * 0.95;
                const risk = ((Math.abs(price - sl) / price) * 100).toFixed(1);
                const reward = ((Math.abs(tp1 - price) / price) * 100).toFixed(1);

                const signalsContainer = document.getElementById('signals-container');
                signalsContainer.innerHTML = `
                    <div class="signal-card ${type}">
                        <div class="signal-header">
                            <span class="signal-type">${isLong ? '🟢 LONG' : '🔴 SHORT'} — ${name}</span>
                            <span class="accuracy">🎯 ${score.toFixed(0)}%</span>
                        </div>
                        <div class="signal-details">
                            <div class="detail-item"><span class="detail-label">Entry:</span><span class="detail-value">$${entryLow.toFixed(4)} - $${entryHigh.toFixed(4)}</span></div>
                            <div class="detail-item"><span class="detail-label">SL:</span><span class="detail-value">$${sl.toFixed(4)} (-${risk}%)</span></div>
                            <div class="detail-item"><span class="detail-label">TP1:</span><span class="detail-value">$${tp1.toFixed(4)} (+${reward}%)</span></div>
                            <div class="detail-item"><span class="detail-label">TP2:</span><span class="detail-value">$${tp2.toFixed(4)}</span></div>
                        </div>
                    </div>
                ` + signalsContainer.innerHTML;

                addLog(`🚨 SIGNAL: ${type.toUpperCase()} ${name} | Score: ${score.toFixed(0)}% | Price: $${price.toFixed(4)}`);
                setTimeout(() => { signalHistory[symbol] = false; }, 600000);
            }
        }

        connectWebSocket();
        addLog('🟢 Terminal active. Scanning 20 low-mid cap coins...');
    </script>
</body>
  </html>
